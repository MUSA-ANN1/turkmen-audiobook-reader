<!DOCTYPE html>
<html lang="tk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>§ 22. Eşidiş Synasy</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Merriweather:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap');

  :root {
    --bg:       #f0f4f8;
    --surface:  #e2e8f0;
    --card:     #ffffff;
    --border:   #cbd5e1;
    --accent:   #2563eb;
    --accent2:  #7c3aed;
    --hl-bg:    rgba(234,179,8,.25);
    --hl:       #854d0e;
    --past:     #1e293b;
    --text:     #94a3b8;
    --muted:    #64748b;
    --success:  #16a34a;
  }

  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    padding: 36px 16px 60px;
    background-image:
      radial-gradient(ellipse 70% 40% at 5% 5%, #dbeafe 0%, transparent 55%),
      radial-gradient(ellipse 50% 50% at 95% 95%, #ede9fe 0%, transparent 55%);
  }

  header { max-width: 820px; margin: 0 auto 28px; animation: fadeDown .5s ease both; }
  .chapter { font-size:.7rem; letter-spacing:3px; text-transform:uppercase; color:var(--muted); margin-bottom:5px; }
  header h1 {
    font-family:'Merriweather',serif; font-size:clamp(1.2rem,3vw,1.9rem);
    font-weight:700; line-height:1.3;
    background:linear-gradient(120deg,var(--accent),var(--accent2));
    -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  }

  .wrap { max-width:820px; margin:0 auto; display:flex; flex-direction:column; gap:16px; }

  .card {
    background:var(--card);
    border:1px solid var(--border);
    border-radius:18px; padding:22px;
    animation:fadeUp .5s ease both;
    box-shadow: 0 2px 12px rgba(0,0,0,.06);
  }

  .card-label {
    font-size:.67rem; letter-spacing:2.5px; text-transform:uppercase;
    color:var(--muted); font-weight:600; margin-bottom:14px;
  }

  /* PLAYER */
  .time-row { display:flex; justify-content:space-between; font-size:.74rem; color:var(--muted); font-variant-numeric:tabular-nums; margin-bottom:6px; }

  .seek-track { height:5px; background:var(--border); border-radius:99px; cursor:pointer; margin-bottom:16px; overflow:hidden; }
  .seek-fill  { height:100%; width:0%; background:linear-gradient(90deg,var(--accent),var(--accent2)); border-radius:99px; pointer-events:none; transition:width .08s linear; }

  .ctrl-row { display:flex; align-items:center; justify-content:center; gap:11px; flex-wrap:wrap; }

  .btn { display:inline-flex; align-items:center; justify-content:center; gap:6px; border:none; border-radius:12px; font-family:'Inter',sans-serif; font-weight:500; cursor:pointer; transition:all .2s; }
  .btn:disabled { opacity:.3; cursor:not-allowed; }

  .btn-main { background:var(--accent); color:#fff; padding:12px 28px; font-size:.92rem; border-radius:14px; min-width:120px; }
  .btn-main:hover:not(:disabled) { background:#1d4ed8; transform:translateY(-1px); }

  .btn-side { background:var(--surface); border:1px solid var(--border); color:var(--text); padding:9px 15px; font-size:.8rem; }
  .btn-side:hover:not(:disabled) { border-color:var(--accent); color:var(--accent); }

  .speed-row { display:flex; align-items:center; justify-content:center; gap:6px; margin-top:11px; flex-wrap:wrap; }
  .spd { background:var(--surface); border:1px solid var(--border); color:var(--muted); padding:3px 10px; border-radius:8px; font-size:.73rem; cursor:pointer; font-family:'Inter',sans-serif; transition:all .2s; }
  .spd.on, .spd:hover { border-color:var(--accent); color:var(--accent); }

  @keyframes pulse-ring {
    0%,100% { box-shadow:0 0 0 0 rgba(37,99,235,.35); }
    50%      { box-shadow:0 0 0 9px rgba(37,99,235,0); }
  }
  .btn-main.playing { animation:pulse-ring 1.8s infinite; }

  .status { text-align:center; font-size:.74rem; color:var(--muted); margin-top:9px; min-height:18px; }

  /* TEXT */
  .text-scroll { max-height:460px; overflow-y:auto; padding-right:4px; }
  .para { font-family:'Merriweather',serif; font-size:.96rem; line-height:2.15; margin-bottom:18px; color:var(--text); }

  /* INLINE IMAGE */
  .inline-img {
    display: block;
    width: 100%;
    max-width: 480px;
    margin: 4px auto 20px;
    border-radius: 12px;
    border: 1px solid var(--border);
    box-shadow: 0 2px 10px rgba(0,0,0,.08);
    object-fit: contain;
  }

  .img-caption {
    text-align: center;
    font-size: .75rem;
    color: var(--past);
    font-family: 'Inter', sans-serif;
    margin-top: -14px;
    margin-bottom: 18px;
  }

  .tbl-wrap { overflow-x:auto; margin-top:6px; }
  table { width:100%; border-collapse:collapse; font-size:.8rem; font-family:'Inter',sans-serif; }
  th { background:var(--surface); color:var(--accent); padding:9px 11px; text-align:left; border:1px solid var(--border); font-weight:600; font-size:.71rem; letter-spacing:.5px; }
  td { padding:8px 11px; border:1px solid var(--border); vertical-align:top; line-height:1.5; color:var(--past); }
  tr:nth-child(even) td { background:rgba(0,0,0,.02); }

  /* WORDS */
  .w { display:inline; padding:1px 3px; border-radius:3px; transition:var(--bg) .1s, color .1s; cursor:pointer; }
  .w:hover  { background:var(--border); }
  .w.active { background:var(--hl-bg) !important; color:var(--hl) !important; font-weight:700; }
  .w.past   { color:var(--past) !important; }

  /* FOOTER */
  footer {
    max-width: 820px;
    margin: 8px auto 0;
    text-align: center;
    font-size: .75rem;
    color: var(--muted);
    padding: 16px 0;
    border-top: 1px solid var(--border);
  }
  footer a { color:var(--accent); text-decoration:none; font-weight:500; transition:color .2s; }
  footer a:hover { color:var(--accent2); }

  ::-webkit-scrollbar { width:5px; }
  ::-webkit-scrollbar-track { background:transparent; }
  ::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }

  @keyframes fadeDown { from{opacity:0;transform:translateY(-14px)} to{opacity:1;transform:translateY(0)} }
  @keyframes fadeUp   { from{opacity:0;transform:translateY(14px)}  to{opacity:1;transform:translateY(0)} }
</style>
</head>
<body>

<header>
  <div class="chapter">§ 22</div>
  <h1>Eşidiş synasynyň gurluşy we ýerine ýetirýän işi</h1>
</header>

<div class="wrap">

  <!-- 1. TEXT -->
  <div class="card">
    <div class="card-label">Tekst</div>
    <div class="text-scroll" id="textScroll"></div>
  </div>

  <!-- 2. PLAYER -->
  <div class="card" id="playerWrap">
    <div class="card-label">Pleýer</div>
    <div class="time-row">
      <span id="tCur">0:00</span>
      <span id="tDur">0:00</span>
    </div>
    <div class="seek-track" id="seekTrack">
      <div class="seek-fill" id="seekFill"></div>
    </div>
    <div class="ctrl-row">
      <button class="btn btn-side" id="backBtn">⏮ 5s</button>
      <button class="btn btn-main" id="playBtn">▶ Oka</button>
      <button class="btn btn-side" id="fwdBtn">5s ⏭</button>
    </div>
    <div class="speed-row">
      <span style="font-size:.7rem;color:var(--muted)">Tizlik:</span>
      <button class="spd" data-s="0.75">0.75×</button>
      <button class="spd on" data-s="1">1×</button>
      <button class="spd" data-s="1.25">1.25×</button>
      <button class="spd" data-s="1.5">1.5×</button>
    </div>
    <div class="status" id="loadStatus">Ýüklenýär...</div>
  </div>

</div>

<!-- 3. FOOTER -->
<footer>
  built by <a href="https://github.com/MUSA-ANN1" target="_blank">Musa</a>
</footer>

<audio id="aud" src="./topic.m4a" preload="metadata"></audio>

<script>
// PARAGRAPHS — index 0 = top image shown before paragraph 0
// IMAGE slots: after paragraph 5 (Içki gulak) and after paragraph 6 (Ýerine ýetirýän işi)
const PARAGRAPHS = [
  "Eşidişiň ähmiýeti. Eşidişiň kömegi bilen adamlar öz aralarynda zähmet we jemgyýetçilik işjeňliginde aragatnaşyk edýärler. Çaganyň geplemegi öwrenmegi hem eşidiş bilen baglanyşyklydyr. Eşidiş synasynyň kömegi bilen daş-töweregimizde bolup geçýän hadysalar baradaky habarlary, ses tolkunlary nerw galpyldysyna öwrülýärler. Bizde ajaýyp duýgularyň ösmeginde hem eşidişiň uly orny bar. Biz gowy sazy, çeper okaýşy, guşlaryň saýraýşyny eşidenimizde, töwerekdäki dünýäni kabul edişimiz has aýdyň we baý bolýar.",
  "Eşidiş synasynyň gurluşy. Adamyň eşidiş synasy üç bölümden: daşky, ortaky we içki gulaklardan ybaratdyr.",
  "Daşky gulak gulak ýelkeninden we daşky eşidiş geçelgesinden ybaratdyr. Gulak ýelkeni ses tolkunlarynyň berk dartylan gulak perdesi bilen gutarýan daşky eşidiş geçelgesine gönükdirilmegine ýardam edýär. Gulak perdesi daşky gulagyň ortaky gulak bilen aralygyny bölýär.",
  "Ortaky gulagyň boşlugy inçejik turbajyk, Ýewstahiýewiň turbasy, arkaly burun-damak bilen birleşýär. Bu turbajygyň üsti bilen daşky gurşawdan ortaky gulagyň boşlugyna howa akymy düşýär. Şeýlelikde, gulak perdesiniň iki gapdalynda-da howanyň deň basyşy emele gelýär. Bu bolsa gulak perdesini şikeslenmekden gorap saklaýar. Haçanda adam uly tizlik bilen has belentlige galanda, meselem, uçarda gulagyndaky agyryny duýýar. Bu bolsa daşky gurşawda basyşyň az bolanlygy sebäpli deprek perde egrelýär. Bu ýagdaýda ýuwdunmak hereketi, deprek perdäniň iki tarapynyň hem basyşyny deňleýär we agyry ýitýär.",
  "Ortaky gulakda biri-biri bilen yzygiderli birleşen üç sany eşidiş süňkjagazlary: çekiçjik, sandaljyk we üzeňňijik ýerleşýär. Olar gulak perdesini, içki gulagyň süýrgült deşijegini dartylyp ýapyp durýan maýyşgak perdesi bilen birleşdirýär.",
  "Içki gulak. Içki gulak kelle süňküniň içine aralaşyp, çekge süňküniň çuňlugynda ýerleşýär. Içki gulak suwuklyklardan doly bolan boşluklar ulgamyndan we aýlaw-aýlaw akarlardan ybaratdyr. Içki gulagyň bu çylşyrymly böleginde eşidişiň ýerine ýetirilişi diňe spiral görnüşli aýlaw-aýlaw ulitka bilen baglanyşyklydyr. Onda eşidiş reseptorlary ýerleşýärler. Onuň galan bölegi, ýagny, ýarym aýlawly akarlardan durýan bölegi bedeniň deňagramlylygyny saklaýan synasyna degişlidir.",
  "Eşidiş synasynyň ýerine ýetirýän işi. Ses tolkunlary gulaga ýetip, daşky eşidiş geçelgesinden geçýär we gulak perdelerini yrgyldadýar. Ses belent boldugyça yrgyldylaryň ýygylygy şonçada uludyr. Ortaky gulagyň eşidiş süňkjagazlary gulak perdesiniň yrgyldylaryny güýçlendirýär we içki gulagyň süýrgült deşigine geçirýär. Bu içki gulagy dolduryp duran suwuklygyň yrgyldylaryny döredýär. Olar bolsa, içki gulagyň reseptorlary tarapyndan nerw impulslaryna öwrülýärler we eşidiş nerwi boýunça kelle beýnisine geçirilýär. Kelle beýnisiniň çekge böleginde ýerleşýän zolagynda sesiň häsiýeti, onuň güýjüniň belentligi gutarnykly aýyl-saýyl edilýär. Içki gulagyň reseptorlaryndan, nerw impulslaryny geçirýän nerwlerden we kelle beýnisiniň çekge böleginde ýerleşen eşidiş zolagyndan durýan bölümine ses seljericisi diýilýär.",
  "Soraglar: 1. Adamyň ýaşaýşynda eşidişiň nähili ähmiýeti bar? 2. Eşidiş synasy haýsy bölümlerden ybarat? 3. Eşidiş seljermesi haýsy bölümlerden durýar? 4. Eşidiş synalary haýsy synalar bilen baglanyşyklydyr?",
];

// Images inserted BEFORE these paragraph indices
// index 0 = top of text (before paragraph 0)
// index 5 = between "Içki gulak" and "Ýerine ýetirýän işi" (after para 5, before para 6)
// index 6 = between "Ýerine ýetirýän işi" and "Soraglar" (after para 6, before para 7)
const IMAGES = {
  0: { src: './img1.jpg', caption: '1-njy surat. Eşidiş synasynyň gurluşy' },
  6: { src: './img2.jpg', caption: '2-nji surat. Içki gulagyň we ondaky ulitkanyň gurluşy' },
  7: { src: './img3.jpg', caption: '3-nji surat. Eşidiş seljermesi' },
};

function wordWeight(word) {
  const clean = word.trim();
  const chars = clean.replace(/[^\wÄäÖöÜüÇçŞşÝýŇňŽžÐð]/g, '').length || 1;
  let w = Math.max(1.0, chars * 0.6);
  const last = clean[clean.length - 1];
  if (last === '.' || last === '!' || last === '?') w += 0.9;
  else if (last === ':' || last === ';') w += 0.6;
  else if (last === ',') w += 0.4;
  return w;
}

let allWords   = [];
let lastActive = -1;
let rafId      = null;
let audioReady = false;
const aud = document.getElementById('aud');

function renderText() {
  const scroll = document.getElementById('textScroll');
  scroll.innerHTML = '';
  allWords = [];

  PARAGRAPHS.forEach((txt, paraIdx) => {
    // Insert image BEFORE this paragraph if defined
    if (IMAGES[paraIdx]) {
      const img = document.createElement('img');
      img.src = IMAGES[paraIdx].src;
      img.alt = IMAGES[paraIdx].caption;
      img.className = 'inline-img';
      scroll.appendChild(img);
      const cap = document.createElement('p');
      cap.className = 'img-caption';
      cap.textContent = IMAGES[paraIdx].caption;
      scroll.appendChild(cap);
    }

    const p = document.createElement('p');
    p.className = 'para';
    txt.split(/\s+/).filter(Boolean).forEach(word => {
      const span = document.createElement('span');
      span.className = 'w';
      span.textContent = word;
      span.addEventListener('click', () => {
        const idx = allWords.findIndex(x => x.el === span);
        if (idx >= 0 && audioReady) {
          aud.currentTime = allWords[idx].start;
          if (aud.paused) togglePlay();
        }
      });
      p.appendChild(span);
      p.appendChild(document.createTextNode(' '));
      allWords.push({ el: span, word, start: 0, end: 0 });
    });
    scroll.appendChild(p);
  });

  const lbl = document.createElement('p');
  lbl.className = 'para';
  lbl.innerHTML = '<strong style="color:#1e293b">11-nji tablisa. Eşidiş synasynyň gurluşy we onuň ýerine ýetirýän işleri</strong>';
  scroll.appendChild(lbl);

  const tw = document.createElement('div');
  tw.className = 'tbl-wrap';
  tw.innerHTML = `<table>
    <tr><th>№</th><th>Ýumuşlar (soraglar)</th><th>Gulagyň düzüm bölekleri (Jogaplar)</th></tr>
    <tr><td>1</td><td>Eşidiş seljermäniň yzygiderli üç bölümi</td><td>1. Eşidiş süňkjagazlary</td></tr>
    <tr><td>2</td><td>Eşidiş gyjyndyrmasyny geçirýär</td><td>2. Eşidiş geçelgesi</td></tr>
    <tr><td>3</td><td>Beýnide gyjyndyryjyny kabul edýär</td><td>3. Eşidiş nerwisi</td></tr>
    <tr><td>4</td><td>Dürli ses gyjyndyrmalaryny amala aşyrýar</td><td>4. Ýewstahiýewiň turbasy</td></tr>
    <tr><td>5</td><td>Daşky gulaga degişli</td><td>5. Reseptorlar</td></tr>
    <tr><td>6</td><td>Içki gulakda ýerleşýärler</td><td>6. Ulitka, ses duýujy öýjükler</td></tr>
    <tr><td>7</td><td>Ortaky gulakda ýerleşýärler</td><td>7. Ýarym aýlawly akarlar</td></tr>
    <tr><td>8</td><td>Ortaky gulagy burun-damak bilen birleşdirýän bölüm</td><td>8. Kelle beýnisiniň eşidiş zonasy</td></tr>
    <tr><td>9</td><td>Suwuklyk bilen doldurylan</td><td>9. Gulak perdesi</td></tr>
    <tr><td>10</td><td>Gulak perdesiniň täsiri bilen yrgyldaýarlar</td><td>10. Gulak ýelkeni</td></tr>
    <tr><td>11</td><td>Ses tolkunlary esasynda yrgyldaýar</td><td></td></tr>
    <tr><td>12</td><td>Deňagramlylyk synasy</td><td></td></tr>
  </table>`;
  scroll.appendChild(tw);
}

function distributeTimestamps(dur) {
  if (!allWords.length || !dur) return;
  const weights = allWords.map(w => wordWeight(w.word));
  const total   = weights.reduce((a, b) => a + b, 0);
  const scale   = dur / total;
  let cursor = 0;
  allWords.forEach((w, i) => {
    w.start = cursor;
    cursor += weights[i] * scale;
    w.end   = cursor;
  });
}

renderText();

const go = () => {
  distributeTimestamps(aud.duration);
  document.getElementById('tDur').textContent = fmt(aud.duration);
  document.getElementById('loadStatus').textContent = 'Taýyn!';
  document.getElementById('loadStatus').style.color = 'var(--success)';
  audioReady = true;
};

if (aud.readyState >= 1) go();
else aud.addEventListener('loadedmetadata', go, { once: true });

aud.addEventListener('error', () => {
  document.getElementById('loadStatus').textContent = '❌ topic.m4a tapylmady';
  document.getElementById('loadStatus').style.color = '#dc2626';
});

document.getElementById('playBtn').addEventListener('click', togglePlay);
document.getElementById('backBtn').addEventListener('click', () => { aud.currentTime = Math.max(0, aud.currentTime - 5); });
document.getElementById('fwdBtn').addEventListener('click',  () => { aud.currentTime = Math.min(aud.duration, aud.currentTime + 5); });

document.getElementById('seekTrack').addEventListener('click', e => {
  if (!audioReady) return;
  const r = e.currentTarget.getBoundingClientRect();
  aud.currentTime = ((e.clientX - r.left) / r.width) * aud.duration;
});

document.querySelectorAll('.spd').forEach(b => {
  b.addEventListener('click', () => {
    document.querySelectorAll('.spd').forEach(x => x.classList.remove('on'));
    b.classList.add('on');
    aud.playbackRate = parseFloat(b.dataset.s);
  });
});

aud.addEventListener('ended', () => {
  document.getElementById('playBtn').textContent = '▶ Oka';
  document.getElementById('playBtn').classList.remove('playing');
  cancelAnimationFrame(rafId);
  document.getElementById('seekFill').style.width = '100%';
  document.getElementById('tCur').textContent = fmt(aud.duration);
});

function togglePlay() {
  if (!audioReady) return;
  if (aud.paused) {
    aud.play();
    document.getElementById('playBtn').textContent = '⏸ Dur';
    document.getElementById('playBtn').classList.add('playing');
    startRaf();
  } else {
    aud.pause();
    document.getElementById('playBtn').textContent = '▶ Oka';
    document.getElementById('playBtn').classList.remove('playing');
    cancelAnimationFrame(rafId);
  }
}

function startRaf() {
  cancelAnimationFrame(rafId);
  (function tick() {
    const t = aud.currentTime;
    document.getElementById('seekFill').style.width =
      (aud.duration ? (t / aud.duration) * 100 : 0) + '%';
    document.getElementById('tCur').textContent = fmt(t);
    highlight(t);
    rafId = requestAnimationFrame(tick);
  })();
}

function highlight(t) {
  let lo = 0, hi = allWords.length - 1, found = -1;
  while (lo <= hi) {
    const mid = (lo + hi) >> 1;
    if (allWords[mid].start <= t && allWords[mid].end > t) { found = mid; break; }
    else if (allWords[mid].end <= t) lo = mid + 1;
    else hi = mid - 1;
  }
  if (found === -1 && t >= (allWords[allWords.length - 1]?.start || 0))
    found = allWords.length - 1;
  if (found === lastActive) return;
  lastActive = found;

  allWords.forEach((w, i) => {
    if (i === found)    w.el.className = 'w active';
    else if (i < found) w.el.className = 'w past';
    else                w.el.className = 'w';
  });

  if (found >= 0)
    allWords[found].el.scrollIntoView({ block: 'center', behavior: 'smooth' });
}

function fmt(s) {
  if (!s || isNaN(s)) return '0:00';
  return Math.floor(s / 60) + ':' + String(Math.floor(s % 60)).padStart(2, '0');
}
</script>
</body>
</html>
